name: CI
on:
  pull_request:
  push:
    branches: ["main", "develop"]
permissions:
  contents: read
jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install
        run: |
          if [ -f frontend/package-lock.json ]; then cd frontend && npm ci; elif [ -f package-lock.json ]; then npm ci; else echo "No lockfile yet"; fi
      - name: Lint
        run: |
          if [ -f frontend/package.json ]; then cd frontend; fi
          npm run lint --if-present
      - name: Test
        run: |
          if [ -f frontend/package.json ]; then cd frontend; fi
          npm test --if-present -- --run
      - name: Build
        run: |
          if [ -f frontend/package.json ]; then cd frontend; fi
          npm run build --if-present
