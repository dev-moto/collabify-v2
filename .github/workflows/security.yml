name: Security Checks
on:
  pull_request:
  push:
    branches: ["main", "develop"]
permissions:
  contents: read
  security-events: write
jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Audit dependencies
        run: |
          if [ -f frontend/package-lock.json ]; then cd frontend && npm audit --audit-level=high; elif [ -f package-lock.json ]; then npm audit --audit-level=high; else echo "No lockfile yet"; fi
  codeql:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@v3
